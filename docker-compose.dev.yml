services:
  db:
    image: postgres:16-alpine
    container_name: teamtask-db-dev
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-teamtask}
      POSTGRES_USER: ${POSTGRES_USER:-teamtask}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teamtaskpw}
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teamtask} -d ${POSTGRES_DB:-teamtask}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teamtask-backend-dev
    env_file:
      - .env.docker
    environment:
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-real-usage}
      DATABASE_URL: postgresql://${POSTGRES_USER:-teamtask}:${POSTGRES_PASSWORD:-teamtaskpw}@db:5432/${POSTGRES_DB:-teamtask}?schema=public
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${DOCKER_BACKEND_PORT:-5001}:5000"

  frontend:
    image: node:20-alpine
    container_name: teamtask-frontend-dev
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: http://localhost:${DOCKER_BACKEND_PORT:-5001}
      VITE_SOCKET_URL: http://localhost:${DOCKER_BACKEND_PORT:-5001}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pgdata-dev:
  frontend_node_modules:
