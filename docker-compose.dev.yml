services:
  db:
    extends:
      file: docker-compose.yml
      service: db
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data

  backend:
    image: node:20-bookworm-slim
    container_name: teamtask-backend
    working_dir: /app
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends openssl ca-certificates && rm -rf /var/lib/apt/lists/* && if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm install; fi && npx prisma generate && npx prisma migrate deploy && node --watch src/server.js"
    env_file:
      - .env.docker
    environment:
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-real-usage}
      DATABASE_URL: postgresql://${POSTGRES_USER:-teamtask}:${POSTGRES_PASSWORD:-teamtaskpw}@db:5432/${POSTGRES_DB:-teamtask}?schema=public
    volumes:
      - .:/app
      - backend-node-modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${DOCKER_BACKEND_PORT:-5001}:5000"

  frontend-dev:
    image: node:20-alpine
    container_name: teamtask-frontend-dev
    working_dir: /app
    command: sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm install; fi && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: http://localhost:${DOCKER_BACKEND_PORT:-5001}
      VITE_SOCKET_URL: http://localhost:${DOCKER_BACKEND_PORT:-5001}
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend
    ports:
      - "5173:5173"

  prometheus:
    image: prom/prometheus:latest
    container_name: teamtask-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: teamtask-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"

  fake-gcs-server:
    image: fsouza/fake-gcs-server:latest
    container_name: teamtask-fake-gcs
    command: ["-scheme", "http", "-port", "4443", "-public-host", "localhost:4443", "-backend", "memory"]
    ports:
      - "4443:4443"

volumes:
  pgdata-dev:
  grafana-storage:
  backend-node-modules:
  frontend-node-modules:
