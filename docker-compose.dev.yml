services:
  db:
    extends:
      file: docker-compose.yml
      service: db
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data

  backend:
    extends:
      file: docker-compose.yml
      service: backend
    ports:
      - "${DOCKER_BACKEND_PORT:-5001}:5000"

  frontend-dev:
    image: node:20-alpine
    container_name: teamtask-frontend-dev
    working_dir: /app
    command: sh -c "npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: http://localhost:${DOCKER_BACKEND_PORT:-5001}
      VITE_SOCKET_URL: http://localhost:${DOCKER_BACKEND_PORT:-5001}
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pgdata-dev:
