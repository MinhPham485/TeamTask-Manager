services:
  db:
    image: postgres:16-alpine
    container_name: teamtask-db
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-teamtask}
      POSTGRES_USER: ${POSTGRES_USER:-teamtask}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teamtaskpw}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teamtask} -d ${POSTGRES_DB:-teamtask}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teamtask-backend
    env_file:
      - .env.docker
    environment:
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-real-usage}
      DATABASE_URL: postgresql://${POSTGRES_USER:-teamtask}:${POSTGRES_PASSWORD:-teamtaskpw}@db:5432/${POSTGRES_DB:-teamtask}?schema=public
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: teamtask-frontend
    depends_on:
      - backend
    expose:
      - "80"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: teamtask-caddy
    depends_on:
      - frontend
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
