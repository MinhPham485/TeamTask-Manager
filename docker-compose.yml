services:
  db:
    image: postgres:16-alpine
    container_name: teamtask-db
    environment:
      POSTGRES_DB: teamtask
      POSTGRES_USER: teamtask
      POSTGRES_PASSWORD: teamtaskpw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamtask -d teamtask"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teamtask-backend
    environment:
      PORT: 5000
      JWT_SECRET: change-me-in-real-usage
      DATABASE_URL: postgresql://teamtask:teamtaskpw@db:5432/teamtask?schema=public
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000
        VITE_SOCKET_URL: http://localhost:5000
    container_name: teamtask-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  pgdata:
