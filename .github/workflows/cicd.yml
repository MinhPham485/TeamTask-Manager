name: TeamTask CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: "20"

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: teamtask
          POSTGRES_USER: teamtask
          POSTGRES_PASSWORD: teamtaskpw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U teamtask -d teamtask"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://teamtask:teamtaskpw@localhost:5432/teamtask?schema=public
      JWT_SECRET: ci-secret-key
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Run backend tests
        run: npm test

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

  build-images:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      backend-image: ${{ steps.image-names.outputs.backend-image }}
      frontend-image: ${{ steps.image-names.outputs.frontend-image }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: prepare image names
        id: image-names
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"

          # use commit SHA to tag images for immutability, and also push 'latest' tags for convenience
          backend_image="ghcr.io/${owner}/${repo}-backend:${GITHUB_SHA}"
          frontend_image="ghcr.io/${owner}/${repo}-frontend:${GITHUB_SHA}"

          echo "backend-image=${backend_image}" >> "$GITHUB_OUTPUT"
          echo "frontend-image=${frontend_image}" >> "$GITHUB_OUTPUT"
          echo "backend-latest=ghcr.io/${owner}/${repo}-backend:latest" >> "$GITHUB_OUTPUT"
          echo "frontend-latest=ghcr.io/${owner}/${repo}-frontend:latest" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.image-names.outputs.backend-image }}
            ${{ steps.image-names.outputs.backend-latest }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=
            VITE_SOCKET_URL=/socket.io
          tags: |
            ${{ steps.image-names.outputs.frontend-image }}
            ${{ steps.image-names.outputs.frontend-latest }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, build-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            # enable debug output and fail fast for visible errors
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "===> fetching latest"
            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main
            
            touch .env.docker
            
            # delete existing GCS_PRIVATE_KEY
            awk -F= '/^[A-Za-z_][A-Za-z0-9_]*=/{ if ($1 != "GCS_PRIVATE_KEY") print }' .env.docker > .env.docker.tmp && mv .env.docker.tmp .env.docker

            set_env() {
              key="$1"
              value="$2"
              # Robust replace-or-append using awk to avoid failing on grep exit codes
              awk -F= -v k="$key" -v v="$value" 'BEGIN{found=0} $1==k{print k"="v; found=1; next} {print} END{if(!found) print k"="v}' .env.docker > .env.docker.tmp && mv .env.docker.tmp .env.docker
            }

            # Inject SMTP provider defaults and credentials
            set_env SMTP_PROVIDER "gmail"
            set_env SMTP_HOST "smtp.gmail.com"
            set_env SMTP_PORT "587"
            set_env SMTP_USER "${{ secrets.SMTP_USER }}"
            set_env SMTP_PASS "${{ secrets.SMTP_PASS }}"
            set_env FROM_EMAIL "minh04082005@gmail.com"
            set_env FROM_NAME "TaskManager"

            # Inject GCS settings
            set_env GCS_PROJECT_ID "taskupload-496308"
            set_env GCS_BUCKET "teamtaskmanager-demo-bucket"
            set_env GCS_CLIENT_EMAIL "upload-service@taskupload-496308.iam.gserviceaccount.com"
            if [ -z "${{ secrets.GCS_PRIVATE_KEY_BASE64 }}" ]; then
              echo "ERROR: GitHub secret GCS_PRIVATE_KEY_BASE64 is required"
              exit 1
            fi
            set_env GCS_PRIVATE_KEY_BASE64 "${{ secrets.GCS_PRIVATE_KEY_BASE64 }}"
            set_env GCS_PUBLIC_BASE_URL "https://storage.googleapis.com/teamtaskmanager-demo-bucket"

            # Use images built by GitHub Actions so the VM only pulls and restarts containers.
            set_env BACKEND_IMAGE "${{ needs.build-images.outputs.backend-image }}"
            set_env FRONTEND_IMAGE "${{ needs.build-images.outputs.frontend-image }}"

            # Login to GitHub Container Registry from the VM before pulling backend/frontend images.
            echo "===> logging in to GHCR"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            echo "===> pulling prebuilt images"
            docker compose --env-file .env.docker -f docker-compose.prod.yml pull backend frontend

            echo "===> starting docker compose"
            if ! docker compose --env-file .env.docker -f docker-compose.prod.yml up -d; then
              echo "ERROR: docker compose up failed"
              docker compose --env-file .env.docker -f docker-compose.prod.yml logs --no-color || true
              exit 1
            fi

            sleep 10

            echo "===> running migrations inside backend"
            if ! docker compose --env-file .env.docker -f docker-compose.prod.yml exec -T backend npm run migrate:deploy; then
              docker compose --env-file .env.docker -f docker-compose.prod.yml logs backend --no-color || true
              exit 1
            fi

            echo "===> restarting nginx"
            if ! docker restart teamtask-nginx; then
              echo "WARN: nginx restart failed"
              docker ps -a || true
            fi

            docker compose --env-file .env.docker -f docker-compose.prod.yml ps
