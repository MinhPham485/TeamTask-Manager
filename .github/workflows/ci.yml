name: TeamTask CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read


env:
  NODE_VERSION: "20"

jobs:
  change:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'src/**'
              - 'prisma/**'
              - 'package.json'
              - 'package-lock.json'
              - 'eslint.config.mjs'
              - 'jest.config.js'
              - 'Dockerfile'
              - '.github/workflows/**'
              - 'docker-compose*.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'
              - 'docker-compose*.yml'
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    needs: [change]
    if: ${{ needs.change.outputs.backend == 'true' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run backend lint
        run: npm run lint
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    needs: [change]
    if: ${{ needs.change.outputs.frontend == 'true' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix frontend
      - name: Run frontend lint
        run: npm run lint --prefix frontend
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    needs: [backend-lint, change]
    if: ${{ needs.change.outputs.backend == 'true' }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: teamtask
          POSTGRES_USER: teamtask
          POSTGRES_PASSWORD: teamtaskpw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U teamtask -d teamtask"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://teamtask:teamtaskpw@localhost:5432/teamtask?schema=public
      JWT_SECRET: ci-secret-key
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Run backend tests
        run: npm test

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    needs: [frontend-lint, change]
    if: ${{ needs.change.outputs.frontend == 'true' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend
